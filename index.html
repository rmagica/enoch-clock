<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enoch Calendar Visual</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #080c14; color: white; font-family: Georgia, serif;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 12px 20px; min-height: 100vh; width: 100%;
}
/* Fixed header — title + Enoch/Greg date lines */
#fixedHeader {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: #080c14; border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 12px 6px;
}
#pageContent { margin-top: 80px; width: 100%; }
h2 { letter-spacing: 4px; color: #f5c842; text-transform: uppercase; font-size: clamp(14px,4vw,18px); margin-bottom: 4px; text-align: center; }
#subtitle { opacity: 0.85; font-size: clamp(10px,2.5vw,12px); margin-bottom: 2px; letter-spacing: 1px; text-align: center; word-break: break-word; padding: 0 8px; white-space: pre-line; }
#gregorian { color: #4da6ff; font-size: clamp(10px,2.5vw,12px); margin-bottom: 0; letter-spacing: 1px; text-align: center; }
/* Mobile: everything centred in a column */
#mainContainer {
  display: flex; flex-direction: column; align-items: center;
  gap: 16px; width: 100%; padding-top: 8px;
}
/* Desktop 3-column layout */
@media (min-width: 900px) {
  #mainContainer {
    flex-direction: row; align-items: stretch;
    justify-content: center; gap: 24px;
    height: calc(100vh - 90px); /* 90px ≈ fixed header height */
    overflow: hidden;
  }
  #clockCol  { width: 260px; flex-shrink: 0; }
  #feastCol  { width: 240px; flex-shrink: 0; }
  #gridWrapper { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  #gridContainer { max-width: 100% !important; }
  #gridCarousel { width: 100%; flex: 1; min-height: 0; }
  /* Grid fills remaining vertical space */
  #gridContainer {
    flex: 1; min-height: 0;
    grid-auto-rows: 1fr;
    align-content: stretch;
  }
  /* Heading labels scale with vh */
  #gridHeading .season-name  { font-size: clamp(10px, 1.8vh, 16px); }
  #gridHeading .enoch-year   { font-size: clamp(8px,  1.3vh, 12px); }
  #gridHeading .greg-year    { font-size: clamp(8px,  1.3vh, 12px); }
  #gridHeading .season-angel { font-size: clamp(7px,  1.2vh, 11px); }
  #gridHeading .season-start { font-size: clamp(7px,  1.2vh, 11px); }
  /* Tile text scales with vh */
  .dayNum      { font-size: clamp(7px,  1.4vh, 13px) !important; }
  .angelLabel  { font-size: clamp(5px,  0.9vh,  8px) !important; }
  .dayBox      { font-size: clamp(6px,  1.0vh, 10px) !important; }
  .dayHeader   { font-size: clamp(6px,  1.0vh, 11px) !important; padding: clamp(1px, 0.4vh, 4px) 0; }
}
/* Clock column */
#clockCol { display: flex; flex-direction: column; align-items: stretch; gap: 10px; width: 100%; max-width: 320px; }
/* City controls — left-aligned text on desktop, centred on mobile */
#cityControls { display: flex; flex-direction: column; align-items: stretch; gap: 2px; width: 100%; }
#controls { display: flex; gap: 8px; width: 100%; }
#error { color: #ff6666; font-size: 12px; min-height: 16px; }
#cityLabel { opacity: 0.85; font-size: 12px; }
#cityLabel strong { color: #f5c842; }
#debug { font-size: 11px; color: rgba(255,255,255,0.7); font-family: monospace; word-break: normal; overflow-wrap: normal; white-space: pre-wrap; }
/* Canvas: always a perfect square, scales to container width */
#clockCanvas { display: block; width: 100%; aspect-ratio: 1 / 1; border-radius: 50%; }
input {
  padding: 8px 12px; background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
  color: white; font-size: 14px; flex: 1; font-family: Georgia, serif;
}
input::placeholder { color: rgba(255,255,255,0.35); }
button {
  padding: 8px 14px; background: #f5c842; color: #000;
  border: none; border-radius: 6px; cursor: pointer;
  font-weight: bold; font-family: Georgia, serif; font-size: 14px; white-space: nowrap;
}
#feastCol { display: flex; flex-direction: column; width: 100%; max-width: 320px; }
#feastSidebar { margin-top: 0; border-top: none; padding-top: 0; }
#solarPoints { font-size: clamp(10px,2.5vw,12px); opacity: 0.85; text-align: center; line-height: 1.9; }
#solarDoW { font-size: clamp(10px,2.5vw,11px); opacity: 0.85; text-align: center; line-height: 1.8; margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
#solarDoW .dow-header { color: #4da6ff; font-size: 10px; letter-spacing: 1px; margin-bottom: 6px; }
#solarDoW .sabbath-carousel { display: flex; align-items: center; justify-content: center; gap: 6px; }
#solarDoW .sab-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 14px; border-radius: 4px; cursor: pointer; padding: 1px 7px; line-height: 1; user-select: none; }
#solarDoW .sab-btn:hover { background: rgba(255,255,255,0.18); }
#solarDoW .sab-rows { display: flex; flex-direction: column; gap: 1px; }
#solarDoW .yr-item { color: #4da6ff; }
#solarDoW .yr-item.is-current { font-weight: bold; }
#solarDoW .yr-item.is-adjacent { opacity: 0.6; }
#gridWrapper { display: flex; flex-direction: column; align-items: stretch; gap: 4px; }
#gridHeading { text-align: center; line-height: 1.7; }
#gridHeading .season-name { font-size: clamp(13px,3vw,16px); font-weight: bold; color: #f5c842; letter-spacing: 3px; text-transform: uppercase; }
#gridHeading .enoch-year { font-size: clamp(10px,2.5vw,12px); color: rgba(255,255,255,0.7); letter-spacing: 2px; }
#gridHeading .greg-year  { font-size: clamp(10px,2.5vw,12px); color: #4da6ff; letter-spacing: 2px; }
#gridHeading .season-angel { font-size: clamp(10px,2.5vw,11px); color: rgba(255,255,255,0.6); letter-spacing: 1px; font-style: italic; }
#gridHeading .season-start { font-size: clamp(10px,2.5vw,11px); letter-spacing: 1px; margin-top: 2px; }
#gridCarousel { display: flex; align-items: stretch; gap: 4px; width: 100%; flex: 1; min-height: 0; }
.arrow-btn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
  color: white; font-size: 18px; border-radius: 6px; cursor: pointer;
  padding: 6px 10px; flex-shrink: 0; user-select: none; line-height: 1;
}
.arrow-btn:hover { background: rgba(255,255,255,0.18); }
#gridContainer {
  display: grid; grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 4px; width: 100%;
  max-width: 350px;
}
.dayHeader { color: #f5c842; font-weight: bold; text-align: center; font-size: clamp(8px,2vw,11px); padding: 4px 0; }
.dayBox {
  aspect-ratio: 1; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.04); color: white; font-size: clamp(8px,2vw,10px);
  position: relative; cursor: default;
}
.dayBox .tooltip { display: none; }
.dayBox.current { border: 2px solid #c8a0d8; background: #c8a0d8; color: #000; font-weight: bold; }
.dayBox.saturday { background: #add8e6; color: #000; border-color: #add8e6; }
.dayBox { position: relative; cursor: pointer; }
#day-tooltip {
  display: none; position: fixed; z-index: 100;
  background: #222; color: #f5c842; font-size: 11px; white-space: nowrap;
  padding: 4px 9px; border-radius: 4px; border: 1px solid #f5c842;
  pointer-events: none;
}
.dayNum { font-size: 13px; }
.angelLabel { font-size: 7px; opacity: 0.6; }
/* Feast outlines use box-shadow so they layer without overlapping borders */
.dayBox.feast-holy    { box-shadow: 0 0 0 2px #ffe600; }
.dayBox.feast-sabbath { box-shadow: 0 0 0 2px #add8e6; }
.dayBox.feast-holiday { box-shadow: 0 0 0 2px #9b59b6; }
.dayBox.feast-fast    { box-shadow: 0 0 0 2px #ff3333; }
.dayBox.feast-holy.feast-sabbath    { box-shadow: 0 0 0 2px #ffe600, 0 0 0 4px #add8e6; }
.dayBox.feast-holy.feast-fast       { box-shadow: 0 0 0 2px #ffe600, 0 0 0 4px #ff3333; }
.dayBox.feast-sabbath.feast-fast    { box-shadow: 0 0 0 2px #add8e6, 0 0 0 4px #ff3333; }
.dayBox.feast-holy.feast-sabbath.feast-fast { box-shadow: 0 0 0 2px #ffe600, 0 0 0 4px #add8e6, 0 0 0 6px #ff3333; }
#feastSidebar { font-size: 11px; line-height: 1.8; margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; min-width: 200px; max-width: 280px; }
#feastSidebar .feast-section-header { font-size: 11px; letter-spacing: 1px; font-weight: bold; margin-top: 8px; margin-bottom: 2px; }
#feastSidebar .feast-entry { display: block; margin-bottom: 8px; }
#feastSidebar .feast-date { display: block; color: rgba(255,255,255,0.5); font-size: 10px; }
#feastSidebar .feast-name { display: block; color: white; }
#feastSidebar .feast-tag { display: block; color: rgba(255,255,255,0.45); font-size: 9px; }
#feastSidebar .feast-tag  { font-size: 9px; opacity: 0.6; font-style: italic; }
#feastSidebar .feast-name-wrap { display: inline; }
#feast-tooltip {
  display: none; position: fixed; z-index: 100;
  background: #1a1a2e; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
  padding: 6px 10px; font-size: 10px; font-style: italic; color: rgba(255,255,255,0.8);
  width: 220px; line-height: 1.5; pointer-events: auto;
}
</style>
</head>
<body>

<div id="fixedHeader">
  <h2>Enoch Calendar</h2>
  <div id="subtitle">...</div>
  <div id="gregorian"></div>
</div>

<div id="pageContent">
<div id="mainContainer">
  <!-- Col 1: City search area already above, clock + solar info -->
  <div id="clockCol">
    <div id="cityControls">
      <div id="controls">
        <input id="cityInput" placeholder="Any city worldwide…">
        <button id="setCity">Set</button>
      </div>
      <div id="error"></div>
      <div id="cityLabel">City: <strong id="cityName">Vancouver</strong> &nbsp;|&nbsp; <span id="timeDisplay"></span></div>
      <div id="debug"></div>
    </div>
    <canvas id="clockCanvas"></canvas>
    <div id="solarPoints"></div>
    <div id="solarDoW">
      <div class="dow-header">SPRING SABBATH CHANGE</div>
      <div class="sabbath-carousel">
        <button class="sab-btn" id="sabbathPrev">&#8249;</button>
        <div class="sab-rows" id="sabbathRows"></div>
        <button class="sab-btn" id="sabbathNext">&#8250;</button>
      </div>
    </div>
  </div>
  <!-- Col 2: Sabbath info + Feasts (desktop only; on mobile this renders after clockCol) -->
  <div id="feastCol">
    <div id="feastSidebar"></div>
  </div>
  <!-- Col 3: Season heading + tile grid -->
  <div id="gridWrapper">
    <div id="gridHeading">
      <div class="season-name" id="headingSeason">SPRING</div>
      <div class="season-angel" id="headingSeasonAngel">Season Angel: Melkeyal</div>
      <div class="enoch-year" id="headingEnochYear">AA 7569</div>
      <div class="greg-year"  id="headingGregYear">AD 2026</div>
      <div class="season-start" id="headingSeasonStart">Season Start: 21 December</div>
    </div>
    <div id="gridCarousel">
      <button class="arrow-btn" id="prevQuarter">&#8249;</button>
      <div id="gridContainer"></div>
      <button class="arrow-btn" id="nextQuarter">&#8250;</button>
    </div>
  </div>
</div>
</div>

<script>
"use strict";

let quarterOffset = 0; // 0=current quarter, negative=past, positive=future

// Dynamic timezone support using Intl API — works for any IANA timezone
function getTzOffset(tzId, utcDate) {
  const fmt = new Intl.DateTimeFormat("en-US", {
    timeZone: tzId, year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
  });
  const parts = fmt.formatToParts(utcDate);
  const get = type => parseInt(parts.find(p => p.type === type).value);
  const h = get("hour") % 24;
  const localDate = new Date(Date.UTC(get("year"), get("month")-1, get("day"), h, get("minute"), get("second")));
  // Round to nearest minute to avoid floating-point drift causing date boundary errors
  return Math.round((localDate - utcDate) / 60000) / 60;
}

// Build month lengths for a given Enoch year start (the March 20 equinox date)
// Each season: months 1 & 2 = 30 days, month 3 = 31 days (intercalary).
// Winter Month 3 (index 11) also receives the 365th day and leap year extra day.
function isLeapYear(year) {
  return (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
}
function getMonths(equinoxYear) {
  // Each season's Month III has 31 days (30 base + 1 intercalary).
  // Winter Month III also receives the 365th day every year (+1),
  // and an additional leap day in leap years (+1).
  // So Winter III = 31 (normal) + 1 (365th) = 32, or + 1 (leap) = 33 in a leap year.
  const winterThreeYear = equinoxYear + 1; // the Gregorian year Winter falls in
  const isLeap = isLeapYear(winterThreeYear);
  return [30, 30, 31,  // Spring (Month III intercalary)
          30, 30, 31,  // Summer (Month III intercalary)
          30, 30, 31,  // Autumn (Month III intercalary)
          30, 30, isLeap ? 33 : 32]; // Winter III: +365th day every year, +leap day if leap
}
const ANGELS = ["Adnarel","Iyasusael","Ijelumiel"];

// City object: lat, lon, tzId (IANA), name
let city = { lat: 49.2827, lon: -123.1207, tzId: "America/Vancouver", name: "Vancouver" };

function getCityTime(c) {
  const utcNow = new Date();
  const offset = getTzOffset(c.tzId, utcNow);
  return new Date(utcNow.getTime() + offset * 3600000);
}

function getCityOffset(c) {
  // Round to nearest 15 minutes (smallest real-world tz offset) to prevent floating point drift
  return Math.round(getTzOffset(c.tzId, new Date()) * 4) / 4;
}

// isDST: compare summer vs winter offset to detect DST
function isDST(utcDate, tzId) {
  if (!tzId) return false;
  const janOff = getTzOffset(tzId, new Date(Date.UTC(utcDate.getUTCFullYear(), 0, 15)));
  const curOff = getTzOffset(tzId, utcDate);
  return curOff > janOff;
}

function sunTimes(date, lat, lon, tzOff) {
  const RAD  = Math.PI / 180;
  const jan1 = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  const doy  = Math.round((date - jan1) / 86400000) + 1;

  const decl = 23.45 * RAD * Math.sin(RAD * (360 / 365) * (doy - 81));
  let cosH   = -Math.tan(lat * RAD) * Math.tan(decl);
  cosH       = Math.max(-1, Math.min(1, cosH));
  const ha   = Math.acos(cosH) / RAD;

  const B   = RAD * (360 / 365) * (doy - 81);
  const EoT = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  const TC  = (4 * (lon - 15 * tzOff) + EoT) / 60;

  return { sunrise: 12 - ha / 15 - TC, sunset: 12 + ha / 15 - TC };
}

// Get local calendar date {year, month(0-based), day} for a UTC moment using Intl — no offset math
function getLocalDateParts(utcDate, tzId) {
  const fmt = new Intl.DateTimeFormat("en-US", {
    timeZone: tzId || "UTC", year: "numeric", month: "2-digit", day: "2-digit"
  });
  const parts = fmt.formatToParts(utcDate);
  return {
    year:  parseInt(parts.find(p => p.type === "year").value),
    month: parseInt(parts.find(p => p.type === "month").value) - 1,
    day:   parseInt(parts.find(p => p.type === "day").value)
  };
}

function getEnoch(utcDate, cityObj) {
  const tzId = cityObj ? cityObj.tzId : "UTC";

  // Get today's local calendar date — pure Intl, no floating point offset math
  const todayParts = getLocalDateParts(utcDate, tzId);
  const todayUTC = new Date(Date.UTC(todayParts.year, todayParts.month, todayParts.day));

  // Find the equinox year: get the local date of this year's equinox, compare to today
  let eqYearFinal = todayParts.year;
  let eqUTC = solarEventUTC(eqYearFinal, 0);
  let eqParts = getLocalDateParts(eqUTC, tzId);
  let dayBoundaryUTC = new Date(Date.UTC(eqParts.year, eqParts.month, eqParts.day));
  // If today is before this year's equinox, use last year's
  if (todayUTC < dayBoundaryUTC) {
    eqYearFinal--;
    eqUTC = solarEventUTC(eqYearFinal, 0);
    eqParts = getLocalDateParts(eqUTC, tzId);
    dayBoundaryUTC = new Date(Date.UTC(eqParts.year, eqParts.month, eqParts.day));
  }

  const MONTHS = getMonths(eqYearFinal);
  const yearLen = MONTHS.reduce((a, b) => a + b, 0);

  // Pure integer day count — both dates are UTC midnight, so no fractional days possible
  const diff = Math.round((todayUTC - dayBoundaryUTC) / 86400000) + 1;
  const doy  = ((diff - 1) % yearLen) + 1;
  let idx = 0, dc = doy;
  for (const m of MONTHS) { if (dc <= m) break; dc -= m; idx++; }
  return { year: 7569 + (eqYearFinal - 2025), day: dc, monthIndex: idx, weekday: ((diff - 1) % 7) + 1, months: MONTHS, dayBoundaryUTC };
}

// 24h decimal hour → canvas angle (0h = top, clockwise)
function toAngle(h) {
  return (h / 24) * 2 * Math.PI - Math.PI / 2;
}

function drawClock(cityDate, tzOff) {
  const canvas = document.getElementById("clockCanvas");
  const ctx    = canvas.getContext("2d");
  // HiDPI: canvas backing store = CSS pixel size × devicePixelRatio, always square
  const dpr  = window.devicePixelRatio || 1;
  const size = canvas.getBoundingClientRect().width || canvas.offsetWidth || 240;
  if (canvas.width !== Math.round(size * dpr) || canvas.height !== Math.round(size * dpr)) {
    canvas.width  = Math.round(size * dpr);
    canvas.height = Math.round(size * dpr);
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = size, H = size;
  const cx = W / 2, cy = H / 2, R = cx - 18;

  ctx.clearRect(0, 0, W, H);

  // cityDate is a UTC Date whose getUTCHours()/getUTCMinutes() = local city time
  const localH = cityDate.getUTCHours();
  const localM = cityDate.getUTCMinutes();
  const localS = cityDate.getUTCSeconds();

  const { sunrise: SR, sunset: SS } = sunTimes(new Date(), city.lat, city.lon, tzOff);

  const dbgParts = getLocalDateParts(new Date(), city.tzId);
  function decHrToHHMM(h) {
    const hh = Math.floor(h) % 24;
    const mm = Math.round((h - Math.floor(h)) * 60);
    return String(hh).padStart(2,"0") + ":" + String(mm).padStart(2,"0");
  }
  document.getElementById("debug").textContent =
    `localDate=${dbgParts.year}-${String(dbgParts.month+1).padStart(2,"0")}-${String(dbgParts.day).padStart(2,"0")}\n` +
    `localTime=${localH}:${String(localM).padStart(2,"0")}  tzOff=${tzOff}\n` +
    `sunrise=${decHrToHHMM(SR)}  sunset=${decHrToHHMM(SS)}`;

  // 1. Full circle = NIGHT (dark blue)
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2 * Math.PI);
  ctx.fillStyle = "#0a1a3a";
  ctx.fill();

  // 2. DAY wedge (sunrise→sunset clockwise), clipped to circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2 * Math.PI);
  ctx.clip();
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, R, toAngle(SR), toAngle(SS), false);
  ctx.closePath();
  ctx.fillStyle = "#f5c842";
  ctx.fill();
  ctx.restore();

  // 3. Border
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2 * Math.PI);
  ctx.strokeStyle = "rgba(255,255,255,0.45)";
  ctx.lineWidth = 2;
  ctx.stroke();

  // 4. Tick marks
  for (let i = 0; i < 24; i++) {
    const a = toAngle(i), len = i % 6 === 0 ? 11 : 5;
    ctx.beginPath();
    ctx.moveTo(cx + (R - 1)   * Math.cos(a), cy + (R - 1)   * Math.sin(a));
    ctx.lineTo(cx + (R - len) * Math.cos(a), cy + (R - len) * Math.sin(a));
    ctx.strokeStyle = "rgba(255,255,255,0.7)";
    ctx.lineWidth   = i % 6 === 0 ? 2 : 1;
    ctx.stroke();
  }

  // 5. Hour numbers (0–23, 24h face)
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "bold 11px -apple-system, BlinkMacSystemFont, sans-serif";
  for (let i = 0; i < 24; i++) {
    const a = toAngle(i);
    const x = cx + (R - 22) * Math.cos(a);
    const y = cy + (R - 22) * Math.sin(a);
    ctx.fillStyle = (i >= SR && i < SS) ? "#1a1200" : "#ffffff";
    ctx.fillText(i, x, y);
  }

  // 6. Hour hand (24h face — full rotation every 24h)
  const hVal   = localH + localM / 60 + localS / 3600;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + R * 0.50 * Math.cos(toAngle(hVal)), cy + R * 0.50 * Math.sin(toAngle(hVal)));
  ctx.strokeStyle = "#ff3333"; ctx.lineWidth = 3; ctx.lineCap = "round";
  ctx.stroke();

  // 7. Minute hand (standard: full rotation every 60 minutes)
  const mAngle = ((localM + localS / 60) / 60) * 2 * Math.PI - Math.PI / 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + R * 0.70 * Math.cos(mAngle), cy + R * 0.70 * Math.sin(mAngle));
  ctx.strokeStyle = "#ff44cc"; ctx.lineWidth = 2; ctx.lineCap = "round";
  ctx.stroke();

  // 8. Seconds hand (full rotation every 60 seconds)
  const sAngle = (localS / 60) * 2 * Math.PI - Math.PI / 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + R * 0.80 * Math.cos(sAngle), cy + R * 0.80 * Math.sin(sAngle));
  ctx.strokeStyle = "#add8e6"; ctx.lineWidth = 1.5; ctx.lineCap = "round";
  ctx.stroke();

  // 9. Centre dot
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, 2 * Math.PI);
  ctx.fillStyle = "#ff3333"; ctx.fill();
}

function drawGrid(enoch, springEqDate, qOffset, todayGDoW) {
  const g = document.getElementById("gridContainer");
  g.innerHTML = "";

  // 1. Resolve which quarter and year to display — MUST come first
  const currentQuarterIdx = Math.floor(enoch.monthIndex / 3);
  let absQuarter = currentQuarterIdx + qOffset;
  let yearShift = 0;
  while (absQuarter < 0) { absQuarter += 4; yearShift--; }
  while (absQuarter > 3) { absQuarter -= 4; yearShift++; }
  const displayQuarterIdx = absQuarter;

  const targetEqYear = springEqDate.getUTCFullYear() + yearShift;
  const targetSpringEq = solarEventUTC(targetEqYear, 0);
  const MONTHS = getMonths(targetEqYear);

  // 2. targetDayBoundary = local midnight on the equinox day
  const G_WD = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  let targetDayBoundary;
  let springDay1GDoW;
  if (yearShift === 0) {
    targetDayBoundary = enoch.dayBoundaryUTC;
    // Back-calculate springDay1GDoW from today's known-correct Gregorian DoW
    // Today is Enoch weekday enoch.weekday, so Enoch day 1 (Sunday) is
    // (todayGDoW - (enoch.weekday - 1) + 7) % 7 days back
    springDay1GDoW = (todayGDoW - (enoch.weekday - 1) + 7) % 7;
  } else {
    const eqParts3 = getLocalDateParts(targetSpringEq, city.tzId);
    targetDayBoundary = new Date(Date.UTC(eqParts3.year, eqParts3.month, eqParts3.day));
    springDay1GDoW = targetDayBoundary.getUTCDay();
  }

  // 3. Compute quarter base + daysBeforeQuarter BEFORE rendering headers
  const base = displayQuarterIdx * 3;
  let daysBeforeQuarter = 0;
  for (let m = 0; m < base; m++) daysBeforeQuarter += MONTHS[m];

  // eqOffset = G-DoW of Enoch col 0 (Enoch Sunday) for this quarter.
  // Each season has 91 Enoch-week days (13 weeks). Any extra calendar days
  // beyond 91 per season (intercalary days) shift the Gregorian anchor forward
  // but do NOT advance the Enoch week — so eqOffset shifts by those extra days.
  let extraDaysBeforeQuarter = 0;
  for (let q = 0; q < displayQuarterIdx; q++) {
    const qTotal = MONTHS[q*3] + MONTHS[q*3+1] + MONTHS[q*3+2];
    extraDaysBeforeQuarter += qTotal - 91;
  }
  const eqOffset = (springDay1GDoW + extraDaysBeforeQuarter) % 7;

  // Enoch week column start for this quarter
  let intercalaryBeforeQ = 0;
  for (let m = 0; m < base; m++) if (MONTHS[m] === 31) intercalaryBeforeQ++;
  const enochColStart = (daysBeforeQuarter - intercalaryBeforeQ) % 7;

  // Column 6 is always Enoch Saturday
  const satHeaderCol = 6;
  const ENOCH_WD = ["Light","Heaven","Plants","Stars","Birds","Man","Sabbath"];
  for (let i = 0; i < 7; i++) {
    const gName = G_WD[(eqOffset + i) % 7];
    const h = document.createElement("div");
    h.className = "dayHeader";
    const isSatCol = (i === satHeaderCol);
    const headerColor = isSatCol ? "#4da6ff" : "#f5c842";
    const subColor = isSatCol ? "#4da6ff" : "#ffffff";
    h.innerHTML = `<span style="color:${headerColor}">${ENOCH_WD[i]}</span><br><span style="font-size:9px;color:${subColor};font-weight:normal">${gName}</span>`;
    g.appendChild(h);
  }

  // Update headings
  const SEASONS_LABEL = ["SPRING","SUMMER","AUTUMN","WINTER"];
  const seasonStartDate = new Date(targetSpringEq.getTime() + daysBeforeQuarter * 86400000);
  const displayEnoch = getEnoch(seasonStartDate);
  const quarterMidDay = Math.floor((MONTHS[base] + MONTHS[base+1] + MONTHS[base+2]) / 2);
  const quarterMidDate = new Date(targetSpringEq.getTime() + (daysBeforeQuarter + quarterMidDay) * 86400000);
  const SEASON_ANGELS = ["Melkeyal", "Helemmelek", "Meleyal", "Narel"];
  // Use the middle month colour of the season as the representative colour for the label
  const SEASON_LABEL_COLORS = [
    "rgb(80, 140, 20)",    // Spring M2 - mid green
    "rgb(200, 100, 0)",    // Summer M2 - amber
    "rgb(110, 50, 30)",    // Autumn M2 - rust brown
    "rgb(75, 75, 85)",     // Winter M2 - mid grey
  ];
  const G_MONTHS_LONG = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const seasonColor = SEASON_LABEL_COLORS[displayQuarterIdx];
  const seasonStartStr = seasonStartDate.getUTCDate() + " " + G_MONTHS_LONG[seasonStartDate.getUTCMonth()];
  document.getElementById("headingSeason").textContent = SEASONS_LABEL[displayQuarterIdx];
  document.getElementById("headingSeason").style.color = seasonColor;
  document.getElementById("headingSeasonAngel").textContent = "Season Angel: " + SEASON_ANGELS[displayQuarterIdx];
  document.getElementById("headingEnochYear").textContent = "AA " + displayEnoch.year;
  document.getElementById("headingGregYear").textContent = "AD " + quarterMidDate.getUTCFullYear();
  document.getElementById("headingSeasonStart").textContent = "Season Start: " + seasonStartStr;
  document.getElementById("headingSeasonStart").style.color = seasonColor;
  // Each month gets a solid colour — 3 distinct steps per season
  // Spring M1→M3: dark green, mid green, yellow-green
  // Summer M1→M3: golden yellow, amber, orange-red
  // Autumn M1→M3: deep red, rust, dark charcoal
  // Winter M1→M3: dark grey, mid grey, blue-grey
  const MONTH_COLORS = [
    "rgb(30, 100, 30)",    // Spring M1 - dark green
    "rgb(80, 140, 20)",    // Spring M2 - mid green
    "rgb(140, 175, 0)",    // Spring M3 - yellow-green
    "rgb(190, 160, 0)",    // Summer M1 - golden yellow
    "rgb(200, 100, 0)",    // Summer M2 - amber
    "rgb(180, 45, 0)",     // Summer M3 - orange-red
    "rgb(150, 30, 10)",    // Autumn M1 - deep red
    "rgb(110, 50, 30)",    // Autumn M2 - rust brown
    "rgb(65, 55, 50)",     // Autumn M3 - dark charcoal
    "rgb(55, 55, 65)",     // Winter M1 - dark grey-blue
    "rgb(75, 75, 85)",     // Winter M2 - mid grey
    "rgb(85, 90, 100)",    // Winter M3 - lighter blue-grey
  ];

  function seasonBoxColor(monthIdx) {
    return MONTH_COLORS[monthIdx] || "rgba(255,255,255,0.04)";
  }

  // enochCol tracks the continuous Enoch weekday column (0=Sun...6=Sat)
  // It must start at daysBeforeQuarter%7 so it's continuous from spring equinox
  let col = 0; // position within quarter (for tooltip date calculation)

  for (let i = 0; i < 3; i++) {
    for (let d = 1; d <= MONTHS[base + i]; d++) {
      const box = document.createElement("div");
      const isIntercalary = (d === 31 && MONTHS[base + i] === 31);
      const isCurrent = (yearShift === 0 && displayQuarterIdx === currentQuarterIdx && base + i === enoch.monthIndex && d === enoch.day);
      const isSat = (col % 7 === 6);
      // Apply season colour (skip for current day and saturday which have their own styles)
      if (!isCurrent && !isSat) {
        box.style.background = seasonBoxColor(base + i);
        box.style.borderColor = "rgba(0,0,0,0.15)";
        box.style.color = "#fff";
      }
      // Feast outlines
      const dayFeasts = getFeastsForDay(base + i, d, MONTHS);
      const hasHoly    = dayFeasts.some(f => f.types.includes("holy"));
      const hasSabbath = dayFeasts.some(f => f.types.includes("sabbath"));
      const hasFast    = dayFeasts.some(f => f.types.includes("fast"));
      const hasHoliday = dayFeasts.some(f => f.types.includes("holiday"));
      let feastClasses = "";
      if (hasHoly)              feastClasses += " feast-holy";
      if (hasSabbath) feastClasses += " feast-sabbath";
      if (hasHoliday) feastClasses += " feast-holiday";
      if (hasFast)              feastClasses += " feast-fast";
      box.className = "dayBox" + (isCurrent ? " current" : (isSat ? " saturday" : "")) + feastClasses;
      // Gregorian date = spring equinox + days before this quarter + position within quarter
      const gregDate = new Date(targetDayBoundary.getTime() + (daysBeforeQuarter + col) * 86400000);
      const G_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const gregStr = gregDate.getUTCDate() + " " + G_MONTHS[gregDate.getUTCMonth()];
      const feastNames = dayFeasts.map(f => f.name).join(", ");
      box.innerHTML = `<span class="dayNum">${d}</span><span class="angelLabel">${ANGELS[i].slice(0,4)}</span><span class="tooltip">${gregStr}${feastNames ? " · " + feastNames : ""}</span>`;
      g.appendChild(box);
      col++;

    }
  }
  updateFeastSidebar(displayQuarterIdx, MONTHS, targetDayBoundary);
}

function solarEventUTC(year, which) {
  // which: 0=spring, 1=summer, 2=autumn, 3=winter
  const Y = (year - 2000) / 1000;
  const JDE0s = [
    2451623.80984 + 365242.37404*Y + 0.05169*Y*Y - 0.00411*Y*Y*Y - 0.00057*Y*Y*Y*Y,
    2451716.56767 + 365241.62603*Y + 0.00325*Y*Y + 0.00888*Y*Y*Y - 0.00030*Y*Y*Y*Y,
    2451810.21715 + 365242.01767*Y - 0.11575*Y*Y + 0.00337*Y*Y*Y + 0.00078*Y*Y*Y*Y,
    2451900.05952 + 365242.74049*Y - 0.06223*Y*Y - 0.00823*Y*Y*Y + 0.00032*Y*Y*Y*Y,
  ];
  let JDE = JDE0s[which];
  const T = (JDE - 2451545) / 36525;
  const W = 35999.373*T - 2.47;
  const dL = 1 + 0.0334*Math.cos(W*Math.PI/180) + 0.0007*Math.cos(2*W*Math.PI/180);
  const terms = [
    [485,324.96,1934.136],[203,337.23,32964.467],[199,342.08,20.186],
    [182,27.85,445267.112],[156,73.14,45036.886],[136,171.52,22518.443],
    [77,222.54,65928.934],[74,296.72,3034.906],[70,243.58,9037.513],
    [58,119.81,33718.147],[52,297.17,150.678],[50,21.02,2281.226],
    [45,247.54,29929.562],[44,325.15,31555.956],[29,60.93,4443.417],
    [18,155.12,67555.328],[17,288.79,4562.452],[16,198.04,62894.029],
    [14,199.76,31557.370],[12,95.39,14577.848],[10,49.11,31071.843],
    [10,165.57,628.302],[10,146.57,20199.711],[10,110.02,16859.074]
  ];
  let S = 0;
  for (const [a, b, cc] of terms) {
    S += a * Math.cos((b + cc * T) * Math.PI / 180);
  }
  JDE += S * 0.00001 / dL;
  return new Date((JDE - 2440587.5) * 86400000);
}

function fmtSolarLocal(utcDate, cityTzOff) {
  const local = new Date(utcDate.getTime() + cityTzOff * 3600000);
  const MONTHS_LONG = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const G_WD_LONG = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const dow = G_WD_LONG[local.getUTCDay()];
  const mo  = MONTHS_LONG[local.getUTCMonth()];
  const dy  = local.getUTCDate();
  const hh  = String(local.getUTCHours()).padStart(2,"0");
  const mm  = String(local.getUTCMinutes()).padStart(2,"0");
  return `${dow} ${mo} ${dy}  ${hh}:${mm}`;
}

// day: start day within that month

  { name: "First Day of Sukkot",               monthIdx: 6,  day: 15, dur: 1, types: ["holy","sabbath"] },

  { name: "Purim",                             monthIdx: 11, day: 14, dur: 1, types: ["holiday"], desc: "Celebrated by reading or listening to the Book of Esther, sending two different edible items to at least one person, giving money to two needy people, and a large, joyous feast." },

// Build a lookup: key = "monthIdx:day" -> array of feast objects active on that day
function buildFeastLookup() {
  const lookup = {};
  for (const f of FEASTS) {
    for (let d = 0; d < f.dur; d++) {
      // Handle month overflow (e.g. Hannukah spans month 8 day 25 → month 9)
      // We'll track absolute day within the year for overflow handling
      const key = f.monthIdx + ':' + (f.day + d);
      if (!lookup[key]) lookup[key] = [];
      lookup[key].push(f);
    }
  }
  return lookup;
}

// Resolve feast lookup key accounting for month overflow
function getFeastsForDay(monthIdx, day, months) {
  const results = [];
  // Days in this month
  const mLen = months[monthIdx];
  if (day <= mLen) {
    // Normal — day is within this month
    const key = monthIdx + ':' + day;
    if (feastLookup[key]) results.push(...feastLookup[key]);
  }
  // Also check if a feast from the previous month overflows into this day
  // e.g. Hannukah: monthIdx=8 day=25, duration=8 → days 25-31 (month 8 has 31 days) then day 1 of month 9
  // We handle this by checking if any feast starting in prevMonth overflows here
  if (monthIdx > 0) {
    const prevMonthLen = months[monthIdx - 1];
    for (const f of FEASTS) {
      if (f.monthIdx === monthIdx - 1) {
        const overflowStart = f.day + f.dur - 1; // last day of feast
        if (overflowStart > prevMonthLen) {
          // feast overflows into this month
          const overflowDay = day + prevMonthLen - f.day; // which day of the feast is this?
          if (overflowDay >= 0 && overflowDay < f.dur && day <= overflowStart - prevMonthLen) {
            if (!results.find(r => r.name === f.name)) results.push(f);
          }
        }
      }
    }
  }
  return results;
}

const feastLookup = buildFeastLookup();

function updateFeastSidebar(displayQuarterIdx, months, dayBoundary) {
  const base = displayQuarterIdx * 3;
  const sidebar = document.getElementById("feastSidebar");
  const MONTH_NAMES = ["Spring I","Spring II","Spring III","Summer I","Summer II","Summer III",
                       "Autumn I","Autumn II","Autumn III","Winter I","Winter II","Winter III"];

  // Format a feast date range as "Spring I, 14" or "Autumn III, 25 – Winter I, 6"
  const GREG_MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function enochToGreg(monthIdx, day, endMonthIdx, endDay) {
    if (!dayBoundary) return "";
    let daysFromStart = 0;
    for (let m = 0; m < monthIdx; m++) daysFromStart += months[m];
    daysFromStart += day - 1;
    const gStart = new Date(dayBoundary.getTime() + daysFromStart * 86400000);
    const startStr = GREG_MONTHS_SHORT[gStart.getUTCMonth()] + " " + gStart.getUTCDate();
    if (endMonthIdx === undefined || (endMonthIdx === monthIdx && endDay === day)) return startStr;
    let daysFromStart2 = 0;
    for (let m = 0; m < endMonthIdx; m++) daysFromStart2 += months[m];
    daysFromStart2 += endDay - 1;
    const gEnd = new Date(dayBoundary.getTime() + daysFromStart2 * 86400000);
    const endStr = GREG_MONTHS_SHORT[gEnd.getUTCMonth()] + " " + gEnd.getUTCDate();
    return startStr + "–" + endStr;
  }

  function feastDateLabel(f, months) {
    const startLabel = MONTH_NAMES[f.monthIdx] + ", " + f.day;
    if (f.dur === 1) return startLabel;
    // Calculate end month and day accounting for month overflow
    let endMonthIdx = f.monthIdx;
    let endDay = f.day + f.dur - 1;
    while (endMonthIdx < 11 && endDay > months[endMonthIdx]) {
      endDay -= months[endMonthIdx];
      endMonthIdx++;
    }
    const endLabel = MONTH_NAMES[endMonthIdx] + ", " + endDay;
    if (endMonthIdx === f.monthIdx) {
      return startLabel + "–" + endDay;
    }
    return startLabel + " – " + endLabel;
  }

  // Collect feasts visible in this quarter (starts here OR overflows from previous month)
  const holyFeasts = [];
  const holidays = [];

  for (const f of FEASTS) {
    const inQuarter = f.monthIdx >= base && f.monthIdx < base + 3;
    // Overflow: feast starts in last month of previous quarter and spills into this one
    const overflowFromPrev = base > 0 && f.monthIdx === base - 1
      && (f.day + f.dur - 1) > months[base - 1];
    if (!inQuarter && !overflowFromPrev) continue;

    const isHoly = f.types.includes("holy") || f.types.includes("sabbath") || f.types.includes("fast");
    if (f.types.includes("holiday") && !isHoly) holidays.push(f);
    else holyFeasts.push(f);
  }

  let html = "";
  if (holyFeasts.length > 0) {
    html += `<div class="feast-section-header" style="color:#ffe600">✦ HOLY FEASTS</div>`;
    for (const f of holyFeasts) {
      const tagHtml = f.types
        .filter(t => t === "sabbath" || t === "fast")
        .map(t => t === "sabbath"
          ? `<span style="color:#4da6ff">(Sabbath)</span>`
          : `<span style="color:#ff3333">(Fast)</span>`)
        .join(" ");
      const dateLabel = feastDateLabel(f, months);
      let _endMI = f.monthIdx, _endD = f.day + f.dur - 1;
      while (_endMI < 11 && _endD > months[_endMI]) { _endD -= months[_endMI]; _endMI++; }
      const gregLabel = enochToGreg(f.monthIdx, f.day, _endMI, _endD);
      const nameHtml = f.desc
        ? `<span class="feast-name-wrap"><span class="feast-name" style="cursor:help;text-decoration:underline dotted rgba(255,255,255,0.4)" data-desc="${f.desc.replace(/"/g,'&quot;')}">${f.name}</span></span>`
        : `<span class="feast-name">${f.name}</span>`;
      html += `<div class="feast-entry">` +
        `<span class="feast-date">${dateLabel}${gregLabel ? ` <span style="opacity:0.5">(${gregLabel})</span>` : ""}</span>` +
        nameHtml +
        `${tagHtml ? `<span class="feast-tag">${tagHtml}</span>` : ""}` +
        `</div>`;
    }
  }
  if (holidays.length > 0) {
    html += `<div class="feast-section-header" style="color:#9b59b6;margin-top:8px">✦ SPECIAL DAYS</div>`;
    for (const f of holidays) {
      const dateLabel = feastDateLabel(f, months);
      let _endMI2 = f.monthIdx, _endD2 = f.day + f.dur - 1;
      while (_endMI2 < 11 && _endD2 > months[_endMI2]) { _endD2 -= months[_endMI2]; _endMI2++; }
      const gregLabel2 = enochToGreg(f.monthIdx, f.day, _endMI2, _endD2);
      const nameHtml2 = f.desc
        ? `<span class="feast-name-wrap"><span class="feast-name" style="cursor:help;text-decoration:underline dotted rgba(255,255,255,0.4)" data-desc="${f.desc.replace(/"/g,'&quot;')}">${f.name}</span></span>`
        : `<span class="feast-name">${f.name}</span>`;
      html += `<div class="feast-entry">` +
        `<span class="feast-date">${dateLabel}${gregLabel2 ? ` <span style="opacity:0.5">(${gregLabel2})</span>` : ""}</span>` +
        nameHtml2 +
        `</div>`;
    }
  }
  if (html === "") html = `<div style="opacity:0.4;font-size:10px">No feasts this season</div>`;
  sidebar.innerHTML = html;
}

function update() {
  const utcNow   = new Date();
  const tzOff    = getCityOffset(city);
  // Shift UTC time by tzOff hours; read result via getUTC* methods = local city time
  const cityDate = new Date(utcNow.getTime() + tzOff * 3600000);
  const enoch    = getEnoch(utcNow, city);
  const yr       = cityDate.getUTCFullYear();

  const hh = String(cityDate.getUTCHours()).padStart(2,"0");
  const mm = String(cityDate.getUTCMinutes()).padStart(2,"0");
  const ss = String(cityDate.getUTCSeconds()).padStart(2,"0");

  const WD_NAMES = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  const GREG_MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

  // Season: based on monthIndex (0-11), each group of 3 = one season
  const SEASONS = ["SPRING","SUMMER","AUTUMN","WINTER"];
  const SEASON_ROMAN = ["I","II","III"];
  const seasonIdx = Math.floor(enoch.monthIndex / 3);       // 0-3
  const monthInSeason = enoch.monthIndex % 3;               // 0-2
  const seasonLabel = SEASONS[seasonIdx] + " " + SEASON_ROMAN[monthInSeason];

  // Gregorian line — use cityDate for local date
  const gregWD = WD_NAMES[cityDate.getUTCDay()];
  const gregMon = GREG_MONTHS[cityDate.getUTCMonth()];
  document.getElementById("subtitle").textContent =
    `AA ${enoch.year} · ${seasonLabel} · DAY ${enoch.day} · WEEKDAY ${enoch.weekday} (${WD_NAMES[enoch.weekday-1]})
` +
    `AD ${cityDate.getUTCFullYear()} · ${gregMon} · ${cityDate.getUTCDate()} · ${gregWD}`;
  document.getElementById("gregorian").textContent = "";
  document.getElementById("timeDisplay").textContent = `${hh}:${mm}:${ss}`;
  // Jean Meeus algorithm for equinox/solstice times, accurate to ~minutes for any year
  // Returns a Date object in UTC
  const solarTzOff = getCityOffset(city);
  // Solar events based on the Gregorian year of day 1 of the currently displayed quarter
  const gridDay1Date = new Date(enoch.dayBoundaryUTC.getTime());
  // quarterOffset shifts which quarter is displayed; find the year for day 1 of that quarter
  const displayedEqYear = enoch.dayBoundaryUTC.getUTCMonth() >= 2
    ? enoch.dayBoundaryUTC.getUTCFullYear()
    : enoch.dayBoundaryUTC.getUTCFullYear() - 1;
  // Day 1 of displayed quarter
  const displayedMONTHS = getMonths(displayedEqYear);
  const displayedBase = (Math.floor(enoch.monthIndex / 3) + quarterOffset);
  let displayedAbsQ = displayedBase;
  let displayedYearShift = 0;
  while (displayedAbsQ < 0) { displayedAbsQ += 4; displayedYearShift--; }
  while (displayedAbsQ > 3) { displayedAbsQ -= 4; displayedYearShift++; }
  const solarYr = displayedEqYear + displayedYearShift;
  const solarTzOff2 = getCityOffset(city);
  function fmtWithComma(utcDate, tzOff) {
    const s = fmtSolarLocal(utcDate, tzOff);
    // Insert comma before the time part (last two tokens "HH:MM")
    const parts = s.split("  ");
    return parts.length === 2 ? parts[0] + ",  " + parts[1] : s;
  }
  document.getElementById("solarPoints").innerHTML =
    `<span style="color:rgb(80,140,20)">🌱 Spring Eq:</span> ${fmtWithComma(solarEventUTC(solarYr, 0), solarTzOff2)}<br>` +
    `<span style="color:rgb(200,100,0)">☀️ Summer Sol:</span> ${fmtWithComma(solarEventUTC(solarYr, 1), solarTzOff2)}<br>` +
    `<span style="color:rgb(110,50,30)">🍂 Autumn Eq:</span> ${fmtWithComma(solarEventUTC(solarYr, 2), solarTzOff2)}<br>` +
    `<span style="color:rgb(75,75,85)">❄️ Winter Sol:</span> ${fmtWithComma(solarEventUTC(solarYr, 3), solarTzOff2)}`;

  // Spring Sabbath Change carousel — rendered by renderSabbathCarousel()
  const G_WD = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  window._sabbathBaseYear = yr; // current Gregorian year
  renderSabbathCarousel();

  drawClock(cityDate, tzOff);
  // Pass today's correct Gregorian DoW so drawGrid can anchor column headers from known-good value
  const springEqForGrid = solarEventUTC(enoch.dayBoundaryUTC.getUTCFullYear(), 0);
  drawGrid(enoch, springEqForGrid, quarterOffset, cityDate.getUTCDay());
}

document.getElementById("setCity").addEventListener("click", async () => {
  const input = document.getElementById("cityInput").value.trim();
  if (!input) return;
  const key = input.toLowerCase();

  // Check built-in fallback first (works offline/sandboxed)
  if (CITY_FALLBACK[key]) {
    city = CITY_FALLBACK[key];
    document.getElementById("cityName").textContent = city.name;
    document.getElementById("error").textContent = "";
    quarterOffset = 0;
    return;
  }

  // Try live geocoding for any other city
  document.getElementById("error").textContent = "Searching…";
  try {
    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(input)}&count=1&language=en&format=json`);
    const data = await res.json();
    if (!data.results || data.results.length === 0) {
      document.getElementById("error").textContent = "City not found. Try a different name.";
      return;
    }
    const r = data.results[0];
    city = { lat: r.latitude, lon: r.longitude, tzId: r.timezone, name: r.name + (r.country ? ", " + r.country : "") };
    document.getElementById("cityName").textContent = city.name;
    document.getElementById("error").textContent = "";
    quarterOffset = 0;
  } catch(e) {
    document.getElementById("error").textContent = "Network unavailable. Try: " + Object.keys(CITY_FALLBACK).slice(0,6).join(", ") + "…";
  }
});
document.getElementById("cityInput").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("setCity").click();
});

// Feast description tooltip — fixed position, never affects layout
document.addEventListener("DOMContentLoaded", () => {
  const feastTooltip = document.getElementById("feast-tooltip");
  const sidebar = document.getElementById("feastSidebar");
  if (!feastTooltip || !sidebar) return;

  let locked = false; // true when tooltip is click-locked open

  function positionTooltip(clientX, clientY) {
    const tw = Math.min(220, window.innerWidth - 16);
    feastTooltip.style.width = tw + "px";
    const th = feastTooltip.offsetHeight;
    let x = clientX + 10;
    let y = clientY - th - 8;
    if (x + tw > window.innerWidth - 8) x = window.innerWidth - tw - 8;
    if (x < 8) x = 8;
    if (y < 8) y = clientY + 16;
    if (y + th > window.innerHeight - 8) y = window.innerHeight - th - 8;
    feastTooltip.style.left = x + "px";
    feastTooltip.style.top  = y + "px";
  }

  function showTooltip(el, clientX, clientY) {
    feastTooltip.innerHTML = el.dataset.desc;
    feastTooltip.style.display = "block";
    positionTooltip(clientX, clientY);
  }

  // Hover: only show/hide if not locked
  sidebar.addEventListener("mouseover", e => {
    if (locked) return;
    const el = e.target.closest("[data-desc]");
    if (!el) { feastTooltip.style.display = "none"; return; }
    showTooltip(el, e.clientX, e.clientY);
  });
  sidebar.addEventListener("mousemove", e => {
    if (locked) return;
    const el = e.target.closest("[data-desc]");
    if (!el) { feastTooltip.style.display = "none"; return; }
    showTooltip(el, e.clientX, e.clientY);
  });
  sidebar.addEventListener("mouseout", e => {
    if (locked) return;
    if (!e.relatedTarget || !e.relatedTarget.closest("[data-desc]")) {
      feastTooltip.style.display = "none";
    }
  });

  // Click on feast name: lock tooltip open
  sidebar.addEventListener("click", e => {
    const el = e.target.closest("[data-desc]");
    if (el) {
      e.stopPropagation();
      if (locked && feastTooltip.innerHTML === el.dataset.desc.replace(/&quot;/g, '"')) {
        // Clicking same item unlocks
        locked = false;
        feastTooltip.style.display = "none";
      } else {
        locked = true;
        showTooltip(el, e.clientX, e.clientY);
      }
      return;
    }
  });

  // Click anywhere outside tooltip or feast name: unlock and hide
  document.addEventListener("click", e => {
    if (!e.target.closest("#feast-tooltip") && !e.target.closest("[data-desc]")) {
      locked = false;
      feastTooltip.style.display = "none";
    }
  });

  // Touch: tap to toggle lock
  sidebar.addEventListener("touchstart", e => {
    const el = e.target.closest("[data-desc]");
    if (!el) { locked = false; feastTooltip.style.display = "none"; return; }
    e.preventDefault();
    const t = e.touches[0];
    locked = true;
    showTooltip(el, t.clientX, t.clientY);
  }, { passive: false });
  document.addEventListener("touchstart", e => {
    if (!e.target.closest("[data-desc]") && !e.target.closest("#feast-tooltip")) {
      locked = false;
      feastTooltip.style.display = "none";
    }
  });
});

// Grid day tooltip — fixed position, clamped to viewport
document.addEventListener("DOMContentLoaded", () => {
  const dayTip = document.getElementById("day-tooltip");
  const grid = document.getElementById("gridContainer");
  if (!dayTip || !grid) return;

  function showDayTip(box, clientX, clientY) {
    const inner = box.querySelector(".tooltip");
    if (!inner) return;
    dayTip.textContent = inner.textContent;
    dayTip.style.display = "block";
    const tw = dayTip.offsetWidth, th = dayTip.offsetHeight;
    let x = clientX - tw / 2;
    let y = clientY - th - 10;
    if (x < 8) x = 8;
    if (x + tw > window.innerWidth - 8) x = window.innerWidth - tw - 8;
    if (y < 8) y = clientY + 14;
    if (y + th > window.innerHeight - 8) y = window.innerHeight - th - 8;
    dayTip.style.left = x + "px";
    dayTip.style.top  = y + "px";
  }

  // Mouse
  grid.addEventListener("mouseover", e => {
    const box = e.target.closest(".dayBox");
    if (box) showDayTip(box, e.clientX, e.clientY);
    else dayTip.style.display = "none";
  });
  grid.addEventListener("mousemove", e => {
    const box = e.target.closest(".dayBox");
    if (box) showDayTip(box, e.clientX, e.clientY);
    else dayTip.style.display = "none";
  });
  grid.addEventListener("mouseout", e => {
    if (!e.target.closest(".dayBox")) dayTip.style.display = "none";
  });

  // Touch — tap to show, tap elsewhere to hide
  grid.addEventListener("touchstart", e => {
    const box = e.target.closest(".dayBox");
    if (!box) { dayTip.style.display = "none"; return; }
    e.preventDefault();
    const t = e.touches[0];
    showDayTip(box, t.clientX, t.clientY);
  }, { passive: false });
  document.addEventListener("touchstart", e => {
    if (!e.target.closest(".dayBox") && !e.target.closest("#day-tooltip")) {
      dayTip.style.display = "none";
    }
  });
});

// ── Spring Sabbath Change Carousel ──
(function() {
  let sabbathOffset = 0;

  function springDay1GDoWForYear(year) {
    const G_WD = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
    const eqUTC = solarEventUTC(year, 0);
    const eqParts = getLocalDateParts(eqUTC, city.tzId);
    return G_WD[new Date(Date.UTC(eqParts.year, eqParts.month, eqParts.day)).getUTCDay()];
  }

  window.renderSabbathCarousel = function() {
    const rows = document.getElementById("sabbathRows");
    if (!rows) return;
    const baseYear = window._sabbathBaseYear || new Date().getUTCFullYear();
    let html = "";
    for (let i = -1; i <= 1; i++) {
      const y = baseYear + sabbathOffset + i;
      const dow = springDay1GDoWForYear(y);
      const cls = i === 0 ? "yr-item is-current" : "yr-item is-adjacent";
      html += `<span class="${cls}">AD ${y}: ${dow}</span>`;
    }
    rows.innerHTML = html;
  };

  document.addEventListener("DOMContentLoaded", () => {
    const prev = document.getElementById("sabbathPrev");
    const next = document.getElementById("sabbathNext");
    if (prev) prev.addEventListener("click", () => { sabbathOffset--; renderSabbathCarousel(); });
    if (next) next.addEventListener("click", () => { sabbathOffset++; renderSabbathCarousel(); });
  });
})();
update();
