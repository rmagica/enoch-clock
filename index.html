<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Enoch Calendar Visual</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080c14;
    color: white;
    font-family: Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    min-height: 100vh;
  }
  h2 {
    letter-spacing: 4px;
    color: #f5c842;
    text-transform: uppercase;
    font-size: 18px;
    margin-bottom: 8px;
  }
  #subtitle {
    opacity: 0.4;
    font-size: 12px;
    margin-bottom: 24px;
    letter-spacing: 2px;
  }
  #controls {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }
  input {
    padding: 8px 12px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: white;
    font-size: 14px;
    width: 220px;
    font-family: Georgia, serif;
  }
  input::placeholder { color: rgba(255,255,255,0.35); }
  button {
    padding: 8px 14px;
    background: #f5c842;
    color: #000;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-family: Georgia, serif;
    font-size: 14px;
  }
  button:hover { background: #ffd85a; }
  #error { color: #ff6666; font-size: 12px; margin-bottom: 8px; min-height: 18px; }
  #cityLabel {
    opacity: 0.5;
    font-size: 12px;
    margin-bottom: 28px;
  }
  #cityLabel strong { color: #f5c842; }
  #mainContainer {
    display: flex;
    gap: 48px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }
  #clockCol {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  canvas {
    border-radius: 50%;
    background: #111;
    display: block;
  }
  #solarPoints {
    font-size: 12px;
    opacity: 0.5;
    text-align: center;
    line-height: 1.9;
  }
  #gridContainer {
    display: grid;
    grid-template-columns: repeat(7, 42px);
    gap: 3px;
  }
  .dayHeader {
    color: #f5c842;
    font-weight: bold;
    text-align: center;
    font-size: 11px;
    padding: 4px 0;
  }
  .dayBox {
    width: 42px;
    height: 42px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    background: rgba(255,255,255,0.04);
    color: white;
  }
  .dayBox.current {
    border: 2px solid #f5c842;
    background: #f5c842;
    color: #000;
    font-weight: bold;
  }
  .dayBox .dayNum { font-size: 13px; }
  .dayBox .angelLabel { font-size: 7px; opacity: 0.6; }
</style>
</head>
<body>

<h2>Enoch Calendar</h2>
<div id="subtitle">YEAR · DAY · WEEKDAY</div>

<div id="controls">
  <input id="cityInput" placeholder="Enter city (e.g. Vancouver)">
  <button id="setCity">Set</button>
</div>
<div id="error"></div>
<div id="cityLabel">Currently: <strong id="cityName">vancouver</strong> · <span id="timeDisplay"></span></div>

<div id="mainContainer">
  <div id="clockCol">
    <canvas id="clockCanvas" width="280" height="280"></canvas>
    <div id="solarPoints"></div>
  </div>
  <div id="gridContainer"></div>
</div>

<script>
const cityDB = {
  vancouver:   { lat: 49.2827,  lon: -123.1207, tz: "America/Vancouver" },
  hawaii:      { lat: 21.3069,  lon: -157.8583, tz: "Pacific/Honolulu" },
  guadalajara: { lat: 20.6597,  lon: -103.3496, tz: "America/Mexico_City" },
};

const MONTHS = [30,30,31,30,30,31,30,30,31,30,30,31];
const ANGELS = ["Adnarel","Iyasusael","Ijelumiel"];

let currentCity = cityDB.vancouver;

function nowInTZ(tz) {
  return new Date(new Date().toLocaleString("en-US", { timeZone: tz }));
}

function getTZOffsetHours(tz) {
  const now = new Date();
  const local = new Date(now.toLocaleString("en-US", { timeZone: tz }));
  return (local - now) / 3600000;
}

function getSunTimes(date, lat, lon, tzOffsetHours) {
  const rad = Math.PI / 180;
  const start = new Date(date.getFullYear(), 0, 1);
  const doy = Math.round((date - start) / 86400000) + 1;

  const decl = 23.45 * rad * Math.sin(rad * (360 / 365) * (doy - 81));
  let cosH = -Math.tan(lat * rad) * Math.tan(decl);
  cosH = Math.max(-1, Math.min(1, cosH));
  const ha = Math.acos(cosH) / rad;

  const B = rad * (360 / 365) * (doy - 81);
  const EoT = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  const LSTM = 15 * tzOffsetHours;
  const TC = (4 * (lon - LSTM) + EoT) / 60;

  return {
    sunrise: 12 - ha / 15 - TC,
    sunset:  12 + ha / 15 - TC,
  };
}

function getEnoch(now) {
  let eq = new Date(now.getFullYear(), 2, 20);
  if (now < eq) eq.setFullYear(eq.getFullYear() - 1);
  const diff = Math.floor((now - eq) / 86400000) + 1;
  const doy = ((diff - 1) % 364) + 1;
  let idx = 0, dc = doy;
  for (let m of MONTHS) {
    if (dc <= m) break;
    dc -= m; idx++;
  }
  const enochYear = 7569 + (eq.getFullYear() - 2025);
  return { year: enochYear, day: dc, monthIndex: idx, weekday: ((diff - 1) % 7) + 1 };
}

function drawClock(now, location) {
  const canvas = document.getElementById("clockCanvas");
  const ctx = canvas.getContext("2d");
  const size = canvas.width;
  const cx = size / 2, cy = size / 2;
  const r = cx - 20;

  ctx.clearRect(0, 0, size, size);

  const tzOff = getTZOffsetHours(location.tz);
  const { sunrise: sr, sunset: ss } = getSunTimes(now, location.lat, location.lon, tzOff);

  const ang = h => (h / 24) * 2 * Math.PI - Math.PI / 2;

  // Day arc
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, ang(sr), ang(ss), false);
  ctx.closePath();
  ctx.fillStyle = "#f5c842";
  ctx.fill();

  // Night arc
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, ang(ss), ang(sr), false);
  ctx.closePath();
  ctx.fillStyle = "#0a1a3a";
  ctx.fill();

  // Border
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(255,255,255,0.6)";
  ctx.lineWidth = 2;
  ctx.stroke();

  // Tick marks
  for (let i = 0; i < 24; i++) {
    const a = ang(i);
    const tickLen = i % 6 === 0 ? 12 : 6;
    ctx.beginPath();
    ctx.moveTo(cx + (r - 2) * Math.cos(a), cy + (r - 2) * Math.sin(a));
    ctx.lineTo(cx + (r - tickLen) * Math.cos(a), cy + (r - tickLen) * Math.sin(a));
    ctx.strokeStyle = "rgba(255,255,255,0.8)";
    ctx.lineWidth = i % 6 === 0 ? 2 : 1;
    ctx.stroke();
  }

  // Hour numbers
  ctx.font = "bold 11px Georgia";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  for (let i = 0; i < 24; i++) {
    const a = ang(i);
    const nx = cx + (r - 24) * Math.cos(a);
    const ny = cy + (r - 24) * Math.sin(a);
    const isDay = i >= sr && i < ss;
    ctx.fillStyle = isDay ? "#1a1a00" : "white";
    ctx.fillText(i, nx, ny);
  }

  // Hour hand
  const h = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + r * 0.55 * Math.cos(ang(h)), cy + r * 0.55 * Math.sin(ang(h)));
  ctx.strokeStyle = "#ff3333";
  ctx.lineWidth = 3;
  ctx.lineCap = "round";
  ctx.stroke();

  // Minute hand
  const mAngle = (now.getMinutes() / 60) * 2 * Math.PI - Math.PI / 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + r * 0.35 * Math.cos(mAngle), cy + r * 0.35 * Math.sin(mAngle));
  ctx.strokeStyle = "rgba(255,255,255,0.7)";
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fillStyle = "#ff3333";
  ctx.fill();
}

function drawGrid(enoch) {
  const g = document.getElementById("gridContainer");
  g.innerHTML = "";

  ["SUN","MON","TUE","WED","THU","FRI","SAT"].forEach(label => {
    const h = document.createElement("div");
    h.className = "dayHeader";
    h.textContent = label;
    g.appendChild(h);
  });

  const base = enoch.monthIndex - (enoch.monthIndex % 3);
  for (let i = 0; i < 3; i++) {
    for (let d = 1; d <= MONTHS[base + i]; d++) {
      const box = document.createElement("div");
      box.className = "dayBox" + (base + i === enoch.monthIndex && d === enoch.day ? " current" : "");
      box.innerHTML = `<span class="dayNum">${d}</span><span class="angelLabel">${ANGELS[i].slice(0,4)}</span>`;
      g.appendChild(box);
    }
  }
}

function update() {
  const now = nowInTZ(currentCity.tz);
  const enoch = getEnoch(now);

  // Subtitle
  document.getElementById("subtitle").textContent =
    `YEAR ${enoch.year} · DAY ${enoch.day} · WEEKDAY ${enoch.weekday}`;

  // Time display
  document.getElementById("timeDisplay").textContent = now.toLocaleTimeString();

  // Solar points
  const y = now.getFullYear();
  const fmt = d => d.toLocaleDateString();
  document.getElementById("solarPoints").innerHTML =
    `🌅 Spring Eq: ${fmt(new Date(y,2,20))}<br>` +
    `☀️ Summer Sol: ${fmt(new Date(y,5,21))}<br>` +
    `🍂 Autumn Eq: ${fmt(new Date(y,8,22))}<br>` +
    `❄️ Winter Sol: ${fmt(new Date(y,11,21))}`;

  drawClock(now, currentCity);
  drawGrid(enoch);
}

document.getElementById("setCity").addEventListener("click", () => {
  const val = document.getElementById("cityInput").value.trim().toLowerCase();
  if (cityDB[val]) {
    currentCity = cityDB[val];
    document.getElementById("cityName").textContent = val;
    document.getElementById("error").textContent = "";
  } else {
    document.getElementById("error").textContent =
      `Unknown city. Try: ${Object.keys(cityDB).join(", ")}`;
  }
});

document.getElementById("cityInput").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("setCity").click();
});

setInterval(update, 1000);
update();
</script>
</body>
</html>
